# Every new tmux window in this session launches a Claude Code session.
# Used by `just dev::claude` via `tmux -CC -f ~/.tmux-claude.conf`.
# The recipe sets CLAUDE_TAB_RGB per-session; ~/.claude-launch.sh reads it,
# emits an iTerm2 "tab color" escape, and then execs claude.

# Needed so the iTerm2 OSC 1337 escape passes through tmux unchanged.
set -g allow-passthrough on

set -g default-command "bash /home/node/.claude-launch.sh"

# Session name shows in iTerm2 (non-CC fallback; harmless in -CC mode).
set -g set-titles on
set -g set-titles-string "#S"

# Don't prompt to kill windows — claude sessions exit cleanly
set -g detach-on-destroy on
set -g remain-on-exit off
